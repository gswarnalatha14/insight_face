{% extends "base.html" %}

{% block content %}
<div class="panel">

  <h2>Subject-wise Attendance</h2>
  <p style="color:#64748b;">Attendance summary by subject</p>

  <table>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Classes Conducted</th>
        <th>Attendance %</th>
      </tr>
    </thead>
    <tbody>
      {% for row in data %}
      <tr>
        <td><strong>{{ row.subject }}</strong></td>
        <td>{{ row.classes }}</td>
        <td>
          <span class="badge
            {% if row.percentage >= 75 %}
              badge-green
            {% elif row.percentage >= 50 %}
              badge-yellow
            {% else %}
              badge-red
            {% endif %}
          ">
            {{ row.percentage }}%
          </span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>
{% endblock %}
