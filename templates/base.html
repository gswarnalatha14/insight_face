<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AttendAI</title>

  <!-- Main styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

  <!-- Chart JS (used in dashboard) -->
  <script src="{{ url_for('static', filename='chart.js') }}" defer></script>
</head>

<body>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar">
  <div class="logo">AttendAI</div>

  <div class="nav">
    <a href="/dashboard" class="nav-btn">Dashboard</a>
    <a href="/subject-attendance" class="nav-btn">Subject Attendance</a>
    <a href="/students" class="nav-btn">Students</a>
    <a href="/timetable" class="nav-btn">Timetable</a>
    <a href="/teachers" class="nav-btn">Teachers</a>

    <div class="divider"></div>

    <a href="{{ url_for('change_password') }}" class="nav-btn secondary">
      Change Password
    </a>

    <a href="/logout" class="nav-btn danger">
      Logout
    </a>
  </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="main">
  {% block content %}{% endblock %}
</div>

<!-- ========== ACTIVE LINK HIGHLIGHT ========== -->
<script>
  const navLinks = document.querySelectorAll(".nav-btn");
  const currentPath = window.location.pathname;

  navLinks.forEach(link => {
    if (link.getAttribute("href") === currentPath) {
      link.classList.add("active");
    }
  });
</script>

</body>
</html>
