{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center; margin-bottom:20px;">
    Taking Attendance: {{ class_doc.subject }}
</h2>

<div class="attendance-container" style="max-width:800px; margin:auto;">

    <!-- ERROR MESSAGE -->
    <div id="error-msg"
         style="display:none; color:red; text-align:center; margin-bottom:20px;">
        ❌ Class not active at this time.
        <br><br>
        <a href="{{ url_for('dashboard') }}">⬅ Return to Dashboard</a>
    </div>

    <!-- CAMERA VIEW -->
    <video id="video"
           autoplay
           muted
           playsinline
           style="width:100%; border-radius:10px; border:2px solid #ccc;">
    </video>

    <!-- HIDDEN CANVAS -->
    <canvas id="canvas" style="display:none;"></canvas>

    <!-- STOP ATTENDANCE -->
    <form method="POST"
          action="{{ url_for('stop_attendance') }}"
          style="text-align:center; margin-top:20px;">
        <button type="submit" class="stop-btn">
            🛑 Stop Attendance
        </button>
    </form>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ---------- START CAMERA ---------- */
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false
        });

        video.srcObject = stream;
        await video.play();
        console.log("Camera started successfully");

    } catch (err) {
        console.error("Camera error:", err);
        alert("Camera access denied");
    }
}

startCamera();

/* ---------- SEND FRAME EVERY 1s ---------- */
setInterval(() => {
    if (video.videoWidth === 0 || video.videoHeight === 0) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(blob => {
        fetch("/process_frame", {
            method: "POST",
            body: blob
        })
        .then(res => {
            if (res.status === 403) {
                document.getElementById("error-msg").style.display = "block";
                video.style.display = "none";
            }
        })
        .catch(err => console.error("Frame send error:", err));
    }, "image/jpeg");

}, 1000);
</script>

{% endblock %}
