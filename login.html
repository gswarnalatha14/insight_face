<!DOCTYPE html>
<html>
<head>
  <title>AttendAI | Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Login specific styling */
    .login-wrapper {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    .login-card {
      background: white;
      padding: 35px;
      width: 350px;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 20px;
      color: #1e293b;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-card button:hover {
      background: #1e40af;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">AttendAI</div>
    <div class="subtitle">Smart Face Recognition Attendance</div>

    <h2>Teacher Login</h2>

    <form method="post" action="/login">
      <input name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</div>

</body>
</html>
